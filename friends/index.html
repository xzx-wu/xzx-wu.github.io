    <img class="frame-corner frame-corner--bl" src="../assets/images/fantasy/frame-corner.webp" alt="" aria-hidden="true">
    <img class="frame-corner frame-corner--br" src="../assets/images/fantasy/frame-corner.webp" alt="" aria-hidden="true">
    <img class="frame-crown" src="../assets/images/fantasy/frame-crown.webp" alt="" aria-hidden="true">
    <img class="frame-compass" src="../assets/images/fantasy/frame-compass.webp" alt="" aria-hidden="true">

    <header class="site-header">
      <nav class="site-nav" aria-label="主导航">
        <a class="brand" href="../index.html">
          <img class="brand-mark" src="../assets/images/fantasy/brand-crest.webp" alt="" aria-hidden="true">
          <span>xzx-wu</span><small>Arcane Archive</small>

        <div class="nav-links">
          <a href="../index.html">首页</a>

        </div>
      </nav>
    </header>

    <main>
      <section class="listing-hero listing-hero--friends">
        <div class="friends-constellation" aria-hidden="true"></div>
        <div class="listing-hero__inner">
          <p class="listing-kicker">CONSTELLATION OF COMPANIONS</p>
          <h1>友人星图</h1>
          <p class="listing-hero__copy">每一座知识灯塔，都照亮一片新的海域。这里记录同行者的博客与持续书写的世界。</p>
          <div class="listing-stats"><span data-friend-count>读取星图中</span><span>知识同行者</span><span>持续相遇</span></div>
        </div>
      </section>

      <section class="listing-stage friends-stage">
        <div class="listing-container">
          <div class="section-title">
            <div><span class="section-title__symbol">✦</span><h2>同行者名录</h2></div>
            <small>从这里前往朋友们的知识世界</small>
          </div>
          <div class="star-map-note">
            <span aria-hidden="true"></span>
            <p>星图上的每一个坐标，都是一段值得拜访的旅程</p>
            <span aria-hidden="true"></span>
          </div>
          <div class="friends-grid" data-friends-grid></div>
          <noscript>
            <div class="friends-noscript">
              <strong>纸间旅栈 · 啾啾老师</strong>
              <a href="https://krystalq.github.io/" target="_blank" rel="noopener noreferrer">开启传送门 ↗</a>

          </noscript>
        </div>
